version: "3.8"

services:
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: proverbs-agent
    ports:
      - "8000:8000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8000
      # Add your API keys and tokens here or use .env file
      # - GitHubToken=${GITHUB_TOKEN}
      # - OpenAI__ApiKey=${OPENAI_API_KEY}
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: human-in-the-loop-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_AGENT_URL=http://agent:8000
    depends_on:
      - agent
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
